on:
  push:
    branches:
      - master

name: release-please
jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    steps:
      - uses: google-github-actions/release-please-action@078b9b8dda7799db29972b379561ff8e19b08e82 # v4.0.3
        id: release
        with:
          release-type: rust
          package-name: ddragon
          bump-minor-pre-major: true
          bump-patch-for-minor-pre-major: true
          changelog-types: '[{ "type": "feat", "section": "Features", "hidden": false },{ "type": "fix", "section": "Bug Fixes", "hidden": false },{ "type": "refactor", "section": "Code Refactoring", "hidden": false }]'
      
      - if: ${{ steps.release.outputs.releases_created }}
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - if: ${{ steps.release.outputs.releases_created }}
        id: toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - if: ${{ steps.release.outputs.releases_created }}
        name: Publish
        uses: katyo/publish-crates@v1
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
